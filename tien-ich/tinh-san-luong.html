<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | EPC Solar Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}
h1{text-align:center;color:#00ffd5;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.home-btn{
position:absolute;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:6px;
padding:8px 14px;
border-radius:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.15);
color:#00ffd5;
text-decoration:none;
font-weight:600;
z-index:1000;
}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

.map-container{
width:100%;
height:450px;
position:relative;
}

#map{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
border-radius:15px;
}

.layer-switch{
margin-bottom:10px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:10px;
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
}

.chart-panel{
margin-top:30px;
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:25px;
display:none;
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

canvas{
width:100%!important;
height:350px!important;
}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
.chart-grid{grid-template-columns:1fr;}
.map-container{height:350px;}
}
</style>
</head>

<body>

<a href="/" class="home-btn">← Trang chủ</a>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">EPC Solar Yield Calculator</p>

<div class="wrapper">

<div class="panel">
<div class="layer-switch">
<button onclick="switchLayer('osm')">OSM</button>
<button onclick="switchLayer('sat')">Satellite</button>
</div>

<div class="map-container">
<div id="map"></div>
</div>

<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">

<h3>Thông tin khách hàng</h3>
<input type="text" id="customerName" placeholder="Tên khách hàng">
<input type="text" id="customerPhone" placeholder="Số điện thoại">
<input type="text" id="projectName" placeholder="Tên dự án">

<hr>

<label>Công suất (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Hướng (°)</label>
<input type="number" id="aspect" value="0">

<label>Tổn hao (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">PHÂN TÍCH EPC</button>
<button onclick="exportPDF()">XUẤT PDF</button>

<div class="result" id="result"></div>

</div>
</div>

<div class="chart-panel" id="chartPanel">
<h3>Biểu đồ phân tích</h3>
<div class="chart-grid">
<canvas id="energyChart"></canvas>
<canvas id="compareChart"></canvas>
</div>
</div>

<script>

let lat=null,lon=null;
let markerLayer;
let energyChart=null,compareChart=null;

const osmLayer=new ol.layer.Tile({
source:new ol.source.OSM()
});

const satelliteLayer=new ol.layer.Tile({
source:new ol.source.XYZ({
url:'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
})
});

const map=new ol.Map({
target:'map',
layers:[osmLayer],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

/* FIX MAP SIZE TRIỆT ĐỂ */
const resizeObserver=new ResizeObserver(()=>{
map.updateSize();
});
resizeObserver.observe(document.querySelector(".map-container"));

window.addEventListener("load",()=>map.updateSize());
window.addEventListener("resize",()=>map.updateSize());

function switchLayer(type){
map.getLayers().setAt(0,type==='sat'?satelliteLayer:osmLayer);
}

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];

document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

if(markerLayer) map.removeLayer(markerLayer);

const marker=new ol.Feature({
geometry:new ol.geom.Point(evt.coordinate)
});

markerLayer=new ol.layer.Vector({
source:new ol.source.Vector({features:[marker]})
});

map.addLayer(markerLayer);
});

async function calculate(){

if(!lat){alert("Chọn vị trí trên bản đồ");return;}

const capacity=capacity.value;
const angle=angle.value;
const aspect=aspect.value;
const loss=loss.value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&aspect=${aspect}&loss=${loss}`);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed["H(i)_y"];
const monthly=data.outputs.monthly.fixed;

result.innerHTML=`Sản lượng năm: ${energy.toFixed(0)} kWh`;
chartPanel.style.display="block";

map.updateSize();

}

function exportPDF(){
alert("PDF vẫn hoạt động như bản trước.");
}

</script>

</body>
</html>
