<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | EPC Solar Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}
h1{text-align:center;color:#00ffd5;margin-bottom:5px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
grid-template-rows:auto auto;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

#map{width:100%;height:450px;border-radius:15px;}

select,input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,255,213,0.4);
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.chart-panel{
grid-column:1 / span 2;
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:25px;
display:none;
opacity:0;
transform:translateY(30px);
transition:all 0.7s ease;
}

.chart-panel.show{
opacity:1;
transform:translateY(0);
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:20px;
}

canvas{
width:100% !important;
height:380px !important;
}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
.chart-grid{grid-template-columns:1fr;}
#map{height:350px;}
}
</style>
</head>

<body>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">EPC Solar Yield Calculator – Residential & C&I</p>

<div class="wrapper">

<div class="panel">
<button onclick="getLocation()">📍 Lấy vị trí</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">

<label>Công suất DC (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Hướng (°)</label>
<input type="number" id="aspect" value="0">

<label>Tổng tổn hao (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">PHÂN TÍCH EPC</button>

<div class="result" id="result"></div>

</div>

<div class="chart-panel" id="chartPanel">
<h3>Phân tích sản lượng & bức xạ</h3>

<div class="chart-grid">
<div>
<h4>Sản lượng tháng (kWh)</h4>
<canvas id="energyChart"></canvas>
</div>

<div>
<h4>Irradiation vs Energy</h4>
<canvas id="compareChart"></canvas>
</div>
</div>

</div>

</div>

<script>

let lat=null;
let lon=null;
let energyChart=null;
let compareChart=null;

const map=new ol.Map({
target:'map',
layers:[new ol.layer.Tile({source:new ol.source.OSM()})],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];
document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;
map.getView().animate({
center:ol.proj.fromLonLat([lon,lat]),
zoom:15,
duration:1200
});
});
}

async function calculate(){

if(!lat){
alert("Chọn vị trí trước");
return;
}

const capacity=document.getElementById("capacity").value;
const angle=document.getElementById("angle").value;
const aspect=document.getElementById("aspect").value;
const loss=document.getElementById("loss").value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&aspect=${aspect}&loss=${loss}`);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed["H(i)_y"];
const monthly=data.outputs.monthly.fixed;

const specificYield=energy/capacity;
const capacityFactor=energy/(capacity*8760);
const PR=energy/(irradiation*capacity);
const P90=energy*0.95;

let labels=[];
let energyValues=[];
let irradiationValues=[];

monthly.forEach(m=>{
labels.push("T"+m.month);
energyValues.push(m.E_m);
irradiationValues.push(m["H(i)_m"]);
});

const resultBox=document.getElementById("result");
resultBox.innerHTML=`
<h3>Kết quả phân tích EPC</h3>
<p><b>Sản lượng năm:</b> ${energy.toFixed(0)} kWh</p>
<p><b>Specific Yield:</b> ${specificYield.toFixed(0)} kWh/kWp</p>
<p><b>Capacity Factor:</b> ${(capacityFactor*100).toFixed(2)} %</p>
<p><b>PR:</b> ${(PR*100).toFixed(1)} %</p>
<p><b>P90:</b> ${P90.toFixed(0)} kWh</p>
`;
resultBox.classList.add("show");

/* HIỆN BIỂU ĐỒ */
const chartPanel=document.getElementById("chartPanel");
chartPanel.style.display="block";
setTimeout(()=>{chartPanel.classList.add("show");},100);

/* Destroy old */
if(energyChart) energyChart.destroy();
if(compareChart) compareChart.destroy();

/* Chart 1 */
energyChart=new Chart(document.getElementById("energyChart"),{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Energy (kWh)',
data:energyValues
}]
},
options:{
responsive:true,
animation:{duration:1500}
}
});

/* Chart 2 */
compareChart=new Chart(document.getElementById("compareChart"),{
type:'line',
data:{
labels:labels,
datasets:[
{
label:'Irradiation (kWh/m²)',
data:irradiationValues,
yAxisID:'y1'
},
{
label:'Energy (kWh)',
data:energyValues,
yAxisID:'y2'
}
]
},
options:{
responsive:true,
interaction:{mode:'index',intersect:false},
animation:{duration:1800},
scales:{
y1:{type:'linear',position:'left'},
y2:{type:'linear',position:'right'}
}
}
});

}
</script>

</body>
</html>
