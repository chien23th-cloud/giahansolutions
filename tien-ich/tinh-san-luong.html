<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | EPC Solar Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}
h1{text-align:center;color:#00ffd5;margin-bottom:5px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

#map{width:100%;height:450px;border-radius:15px;}

select,input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:10px;
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
}

.result h3{
margin-bottom:15px;
color:#00ffd5;
}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.result-box{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:10px;
font-size:14px;
}

.result-box b{
display:block;
font-size:18px;
color:#00ffd5;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

table th, table td{
padding:6px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

canvas{
margin-top:20px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
#map{height:350px;}
}
</style>
</head>

<body>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">EPC Solar Yield Calculator – Residential & C&I</p>

<div class="wrapper">

<div class="panel">
<button onclick="getLocation()">📍 Lấy vị trí</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">

<label>Chế độ hệ thống</label>
<select id="mode" onchange="applyMode()">
<option value="res">EPC Dân dụng & SME</option>
<option value="ci">EPC C&I / Nhà xưởng</option>
</select>

<label>Công suất DC (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Hướng (°) – 0 = Nam</label>
<input type="number" id="aspect" value="0">

<label>Tổng tổn hao (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">PHÂN TÍCH EPC</button>

<div class="result" id="result" style="display:none;"></div>

</div>
</div>

<script>

let lat=null;
let lon=null;
let chartInstance=null;

function formatVN(num){
return new Intl.NumberFormat('vi-VN').format(num);
}

const map=new ol.Map({
target:'map',
layers:[new ol.layer.Tile({source:new ol.source.OSM()})],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];
document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;
map.getView().animate({
center:ol.proj.fromLonLat([lon,lat]),
zoom:15
});
});
}

function applyMode(){
const mode=document.getElementById("mode").value;
if(mode==="res"){
document.getElementById("loss").value=14;
document.getElementById("angle").value=15;
}else{
document.getElementById("loss").value=10;
document.getElementById("angle").value=10;
}
}

async function calculate(){

if(!lat){
alert("Chọn vị trí trước");
return;
}

const capacity=parseFloat(document.getElementById("capacity").value);
const angle=document.getElementById("angle").value;
const aspect=document.getElementById("aspect").value;
const loss=document.getElementById("loss").value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&aspect=${aspect}&loss=${loss}`);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed["H(i)_y"];
const monthly=data.outputs.monthly.fixed;

const specificYield=energy/capacity;
const capacityFactor=energy/(capacity*8760);
const PR=energy/(irradiation*capacity);
const P90=energy*0.95;

let monthTable="";
let labels=[];
let values=[];

monthly.forEach(m=>{
labels.push("T"+m.month);
values.push(m.E_m);
monthTable+=`
<tr>
<td>T${m.month}</td>
<td>${formatVN(Math.round(m.E_m))} kWh</td>
</tr>`;
});

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=`
<h3>KẾT QUẢ PHÂN TÍCH EPC</h3>

<div class="result-grid">
<div class="result-box">
Annual Yield
<b>${formatVN(Math.round(energy))} kWh</b>
</div>

<div class="result-box">
Specific Yield
<b>${formatVN(Math.round(specificYield))} kWh/kWp</b>
</div>

<div class="result-box">
Capacity Factor
<b>${(capacityFactor*100).toFixed(2)} %</b>
</div>

<div class="result-box">
Performance Ratio
<b>${(PR*100).toFixed(1)} %</b>
</div>

<div class="result-box">
P90 Estimate
<b>${formatVN(Math.round(P90))} kWh</b>
</div>
</div>

<h4>SẢN LƯỢNG THEO THÁNG</h4>

<table>
<thead>
<tr>
<th>Tháng</th>
<th>Sản lượng (kWh)</th>
</tr>
</thead>
<tbody>
${monthTable}
</tbody>
</table>

<canvas id="yieldChart"></canvas>
`;

if(chartInstance){
chartInstance.destroy();
}

const ctx=document.getElementById("yieldChart");

chartInstance=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Sản lượng (kWh)',
data:values
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
y:{
ticks:{
callback:function(value){
return formatVN(value);
}
}
}
}
}
});

}

</script>

</body>
</html>
