<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | Tính Sản Lượng Điện Mặt Trời</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}

header{
text-align:center;
margin-bottom:30px;
}

header img{
height:70px;
margin-bottom:10px;
}

h1{color:#00ffd5;}
.subtitle{color:#aaa;margin-top:5px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

#map{width:100%;height:500px;border-radius:15px;}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
margin-bottom:10px;
width:100%;
}

.label{font-size:14px;margin-bottom:5px;color:#aaa;}
input[type=range]{width:100%;}
.value{font-weight:600;color:#00ffd5;margin-bottom:15px;}

.result{
margin-top:20px;
padding:20px;
background:rgba(0,255,213,0.08);
border-radius:12px;
text-align:center;
}

.big-number{
font-size:30px;
font-weight:700;
color:#00ffd5;
margin:10px 0;
}

footer{
margin-top:40px;
text-align:center;
color:#aaa;
font-size:14px;
}

/* Floating Buttons */
.float-btn{
position:fixed;
right:20px;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
cursor:pointer;
z-index:999;
}

.messenger{bottom:90px;background:#0084ff;}
.zalo{bottom:20px;background:#0068ff;}

.float-btn img{width:28px;}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
#map{height:350px;}
}
</style>
</head>

<body>

<header>
<img src="logo.png" alt="Gia Han Solutions">
<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">TÍNH TOÁN SẢN LƯỢNG ĐIỆN MẶT TRỜI CHÍNH XÁC THEO VỊ TRÍ THỰC TẾ</p>
</header>

<div class="wrapper">

<div class="panel">
<button onclick="getUserLocation()">📍 Lấy vị trí của tôi</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">

<div class="label">Công suất hệ thống (kWp)</div>
<input type="range" min="1" max="50" value="5" id="capacity">
<div class="value" id="capVal">5 kWp</div>

<button onclick="calculate()">TÍNH SẢN LƯỢNG CHÍNH XÁC</button>

<div class="result" id="resultBox" style="display:none;">
<div id="ghiVal"></div>
<div class="big-number" id="energyYear"></div>
<div id="energyMonth"></div>
</div>

</div>
</div>

<footer>
Hotline: 0981 825 636 | Email: info@giahansolutions.io.vn  
Fanpage: fb.com/giahansolutions
</footer>

<!-- Floating Buttons -->
<a href="https://m.me/669698252892555" target="_blank">
<div class="float-btn messenger">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</div>
</a>

<a href="https://zalo.me/0981825636" target="_blank">
<div class="float-btn zalo">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
</div>
</a>

<script>

let selectedLat=null;
let selectedLon=null;
let markerLayer;

const map=new ol.Map({
target:'map',
layers:[new ol.layer.Tile({source:new ol.source.OSM()})],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

function addMarker(lon,lat){
if(markerLayer) map.removeLayer(markerLayer);
const marker=new ol.Feature({
geometry:new ol.geom.Point(ol.proj.fromLonLat([lon,lat]))
});
markerLayer=new ol.layer.Vector({
source:new ol.source.Vector({features:[marker]})
});
map.addLayer(markerLayer);
}

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
selectedLon=coord[0];
selectedLat=coord[1];
addMarker(selectedLon,selectedLat);
document.getElementById("coords").innerText=
`Vị trí: ${selectedLat.toFixed(5)}, ${selectedLon.toFixed(5)}`;
});

function getUserLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
selectedLat=pos.coords.latitude;
selectedLon=pos.coords.longitude;

map.getView().animate({
center:ol.proj.fromLonLat([selectedLon,selectedLat]),
zoom:15
});
addMarker(selectedLon,selectedLat);
});
}

document.getElementById("capacity").oninput=()=>{
document.getElementById("capVal").innerText=
document.getElementById("capacity").value+" kWp";
};

async function calculate(){

if(!selectedLat){
alert("Vui lòng chọn vị trí");
return;
}

const capacity=document.getElementById("capacity").value;

const url=`https://re.jrc.ec.europa.eu/api/v5_2/PVcalc?lat=${selectedLat}&lon=${selectedLon}&peakpower=${capacity}&loss=14&outputformat=json`;

const response=await fetch(url);
const data=await response.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed.H(i)_y;

document.getElementById("resultBox").style.display="block";
document.getElementById("ghiVal").innerHTML="Bức xạ: <b>"+irradiation.toFixed(0)+" kWh/m²/năm</b>";
document.getElementById("energyYear").innerText=energy.toFixed(0)+" kWh/năm";
document.getElementById("energyMonth").innerText="≈ "+(energy/12).toFixed(0)+" kWh/tháng";

}

</script>

</body>
</html>
