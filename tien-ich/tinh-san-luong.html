<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính hiệu quả điện mặt trời | Gia Han Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;overflow-x:hidden;}

h1{text-align:center;color:#00ffd5;margin-bottom:5px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:30px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
transition:all 0.6s ease;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
transition:all 0.6s ease;
}

#map{
width:100%;
height:420px;
border-radius:15px;
transition:height 0.6s ease;
}

#chart-panel{
opacity:0;
transform:translateY(40px);
transition:all 0.6s ease;
}

.wrapper.has-result #chart-panel{
opacity:1;
transform:translateY(0);
}

.wrapper.has-result #map{
height:280px;
}

select,input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffd5;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:10px;
transition:transform 0.2s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:20px;
padding:20px;
background:rgba(0,255,213,0.12);
border-radius:12px;
opacity:0;
transform:translateX(40px);
transition:all 0.6s ease;
}

.wrapper.has-result .result{
opacity:1;
transform:translateX(0);
}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.result-box{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
text-align:center;
}

.result-box b{
display:block;
font-size:20px;
color:#00ffd5;
margin-top:6px;
}

canvas{
margin-top:15px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
}

.cta{
background:#00ffd5;
color:#000;
font-size:16px;
padding:14px;
border-radius:12px;
font-weight:700;
margin-top:10px;
}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">Công cụ tính toán hiệu quả đầu tư điện mặt trời</p>

<div class="wrapper" id="mainWrapper">

<div class="panel">
<button onclick="getLocation()">📍 Lấy vị trí</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>

<div id="chart-panel">
<h3 style="color:#00ffd5;margin-top:20px;">SẢN LƯỢNG THEO THÁNG</h3>
<canvas id="yieldChart"></canvas>
</div>
</div>

<div class="panel">

<label>Công suất lắp đặt (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Giá điện trung bình (VNĐ/kWh)</label>
<input type="number" id="price" value="2500">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Tổn hao hệ thống (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">TÍNH HIỆU QUẢ</button>

<div class="result" id="result"></div>

</div>
</div>

<script>

let lat=null;
let lon=null;
let chartInstance=null;

function formatVN(num){
return new Intl.NumberFormat('vi-VN').format(num);
}

const map=new ol.Map({
target:'map',
layers:[new ol.layer.Tile({source:new ol.source.OSM()})],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];
document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;
map.getView().animate({
center:ol.proj.fromLonLat([lon,lat]),
zoom:15
});
});
}

async function calculate(){

if(!lat){
alert("Vui lòng chọn vị trí trên bản đồ");
return;
}

const wrapper=document.getElementById("mainWrapper");

const capacity=parseFloat(document.getElementById("capacity").value);
const price=parseFloat(document.getElementById("price").value);
const angle=document.getElementById("angle").value;
const loss=document.getElementById("loss").value;

const url=`https://re.jrc.ec.europa.eu/api/v5_2/PVcalc?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&loss=${loss}&outputformat=json`;

const res=await fetch(url);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const monthly=data.outputs.monthly.fixed;

const saving=energy*price;
const investment=capacity*15000000;
const payback=investment/saving;

let labels=[];
let values=[];

monthly.forEach(m=>{
labels.push("Tháng "+m.month);
values.push(m.E_m);
});

wrapper.classList.add("has-result");

document.getElementById("result").innerHTML=`
<h3 style="color:#00ffd5;margin-bottom:15px;">HIỆU QUẢ ĐẦU TƯ DỰ KIẾN</h3>

<div class="result-grid">
<div class="result-box">
Sản lượng mỗi năm
<b>${formatVN(Math.round(energy))} kWh</b>
</div>

<div class="result-box">
Tiết kiệm mỗi năm
<b>${formatVN(Math.round(saving))} VNĐ</b>
</div>

<div class="result-box">
Chi phí đầu tư
<b>${formatVN(Math.round(investment))} VNĐ</b>
</div>

<div class="result-box">
Hoàn vốn
<b>${payback.toFixed(1)} năm</b>
</div>
</div>

<button class="cta">NHẬN BÁO GIÁ CHI TIẾT</button>
`;

if(chartInstance){
chartInstance.destroy();
}

const ctx=document.getElementById("yieldChart");

chartInstance=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Sản lượng (kWh)',
data:values
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{
y:{beginAtZero:true},
x:{
ticks:{
callback:function(value){
return formatVN(value);
}
}
}
}
}
});

}

</script>

</body>
</html>
