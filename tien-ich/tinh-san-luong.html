<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính Sản Lượng Điện Mặt Trời | Gia Han Solutions</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:30px;}
.container{max-width:1100px;margin:auto;}
h2{color:#00ffd5}
.section{background:rgba(255,255,255,0.05);padding:20px;border-radius:12px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;}
input,button{padding:8px;border-radius:6px;border:none;width:100%;margin-top:5px;}
button{background:#00ffd5;font-weight:600;cursor:pointer;}
.card{background:rgba(255,255,255,0.06);padding:15px;border-radius:10px;font-size:14px;}
.card .label{font-size:12px;color:#aaa;}
.highlight{background:rgba(0,255,213,0.2);font-weight:600;}
footer{margin-top:40px;text-align:center;font-size:13px;color:#aaa;}
#error{color:#ff6b6b;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h2>GIA HAN SOLUTIONS</h2>
<p>Công cụ tính toán sản lượng & tài chính điện mặt trời (EPC)</p>

<div class="section">
<h3>Thông số kỹ thuật</h3>
<div class="grid">
<div><label>Latitude</label><input id="lat" value="21.0285"></div>
<div><label>Longitude</label><input id="lon" value="105.8542"></div>
<div><label>Công suất (kWp)</label><input id="capacity" value="10"></div>
<div><label>Góc nghiêng (°)</label><input id="angle" value="15"></div>
<div><label>Hướng (°)</label><input id="aspect" value="0"></div>
<div><label>Loss (%)</label><input id="loss" value="14"></div>
</div>
</div>

<div class="section">
<h3>Thông số tài chính</h3>
<div class="grid">
<div><label>Suất đầu tư (VNĐ/kWp)</label><input id="capexkwp" value="15000000"></div>
<div><label>Giá điện (VNĐ/kWh)</label><input id="tariff" value="2500"></div>
<div><label>Chiết khấu (%)</label><input id="discount" value="10"></div>
<div><label>Suy giảm (%/năm)</label><input id="degradation" value="0.5"></div>
</div>
</div>

<button onclick="calculate()">Tính toán</button>
<button onclick="exportPDF()">Xuất PDF Proposal</button>

<div id="error"></div>
<div id="result"></div>
<canvas id="monthlyChart" style="margin-top:30px;"></canvas>

</div>

<footer>
Gia Han Solutions – EPC điện mặt trời<br>
Hotline: 0981 825 636<br>
https://giahansolutions.io.vn
</footer>

<script>

let energy=0, monthly=[], irradiation=0, NPV=0, IRR=0;

function formatNumber(num){
return Number(num).toLocaleString('vi-VN');
}

async function calculate(){

document.getElementById("error").innerHTML="";
document.getElementById("result").innerHTML="Đang tính toán...";

try{

const lat = parseFloat(document.getElementById("lat").value);
const lon = parseFloat(document.getElementById("lon").value);
const capacity = parseFloat(document.getElementById("capacity").value);
const angle = parseFloat(document.getElementById("angle").value);
const aspect = parseFloat(document.getElementById("aspect").value);
const loss = parseFloat(document.getElementById("loss").value);

const url = `https://re.jrc.ec.europa.eu/api/v5_2/PVcalc?lat=${lat}&lon=${lon}&peakpower=${capacity}&loss=${loss}&angle=${angle}&aspect=${aspect}&outputformat=json`;

const res = await fetch(url);

if(!res.ok) throw new Error("Không kết nối được PVGIS");

const data = await res.json();

if(!data.outputs) throw new Error("PVGIS không trả dữ liệu");

energy = data.outputs.totals.fixed.E_y;
monthly = data.outputs.monthly.fixed;
irradiation = data.outputs.totals.fixed["H(i)_y"];

const specificYield = energy/capacity;
const capacityFactor = energy/(capacity*8760);
const PR = energy/(irradiation*capacity);
const P90 = energy*0.95;

const capex = capacity * parseFloat(document.getElementById("capexkwp").value);
const tariff = parseFloat(document.getElementById("tariff").value);
const discount = parseFloat(document.getElementById("discount").value)/100;
const degradation = parseFloat(document.getElementById("degradation").value)/100;

let cashflows=[-capex];
let yearlyEnergy=energy;

for(let i=1;i<=20;i++){
cashflows.push(yearlyEnergy*tariff);
yearlyEnergy*=(1-degradation);
}

function npv(rate,cf){
return cf.reduce((a,c,i)=>a+c/Math.pow(1+rate,i),0);
}

function irr(cf){
let guess=0.1;
for(let i=0;i<200;i++){
let f=npv(guess,cf);
let df=(npv(guess+0.0001,cf)-f)/0.0001;
guess-=f/df;
}
return guess;
}

NPV=npv(discount,cashflows);
IRR=irr(cashflows);

document.getElementById("result").innerHTML=`
<div class="grid">
<div class="card highlight"><div class="label">Annual Yield (P50)</div>${formatNumber(energy.toFixed(0))} kWh</div>
<div class="card"><div class="label">P90</div>${formatNumber(P90.toFixed(0))} kWh</div>
<div class="card"><div class="label">Specific Yield</div>${formatNumber(specificYield.toFixed(0))}</div>
<div class="card"><div class="label">PR</div>${(PR*100).toFixed(1)}%</div>
<div class="card"><div class="label">Capacity Factor</div>${(capacityFactor*100).toFixed(2)}%</div>
<div class="card"><div class="label">NPV (20 năm)</div>${formatNumber(NPV.toFixed(0))} VNĐ</div>
<div class="card"><div class="label">IRR</div>${(IRR*100).toFixed(2)}%</div>
</div>
`;

if(window.chart) window.chart.destroy();

window.chart=new Chart(document.getElementById("monthlyChart"),{
type:'bar',
data:{
labels:monthly.map(m=>`T${m.month}`),
datasets:[{data:monthly.map(m=>m.E_m)}]
},
options:{plugins:{legend:{display:false}}}
});

}catch(err){
document.getElementById("error").innerHTML="Lỗi: "+err.message;
document.getElementById("result").innerHTML="";
}

}

function exportPDF(){

if(!energy){
alert("Vui lòng tính toán trước khi xuất PDF.");
return;
}

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();

pdf.setFontSize(18);
pdf.text("GIA HAN SOLUTIONS",20,20);

pdf.setFontSize(12);
pdf.text("BÁO CÁO PHÂN TÍCH ĐIỆN MẶT TRỜI",20,30);

pdf.text(`Annual Yield (P50): ${formatNumber(energy.toFixed(0))} kWh`,20,50);
pdf.text(`NPV (20 năm): ${formatNumber(NPV.toFixed(0))} VNĐ`,20,60);
pdf.text(`IRR: ${(IRR*100).toFixed(2)} %`,20,70);

pdf.text("Cam kết kỹ thuật:",20,90);
pdf.text("- Thiết kế theo IEC & TCVN hiện hành",25,100);
pdf.text("- Sai số sản lượng ±5%",25,110);
pdf.text("- Bảo hành module 25 năm hiệu suất",25,120);

pdf.save("Proposal-Gia-Han-Solutions.pdf");
}

</script>

</body>
</html>
