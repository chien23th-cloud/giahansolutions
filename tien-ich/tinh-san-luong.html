<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | Tính sản lượng điện mặt trời</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}
h1{text-align:center;color:#00ffd5;margin-bottom:5px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

#map{width:100%;height:500px;border-radius:15px;}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-bottom:10px;
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
text-align:center;
}

.big{
font-size:28px;
font-weight:700;
color:#00ffd5;
margin:10px 0;
}

footer{
margin-top:40px;
text-align:center;
color:#aaa;
font-size:14px;
}

/* Floating buttons */
.float{
position:fixed;
right:20px;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
cursor:pointer;
z-index:999;
}

.messenger{bottom:90px;background:#0084ff;}
.zalo{bottom:20px;background:#0068ff;}

.float img{width:28px;}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
#map{height:350px;}
}
</style>
</head>

<body>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">TÍNH SẢN LƯỢNG ĐIỆN MẶT TRỜI THEO PVGIS</p>

<div class="wrapper">

<div class="panel">
<button onclick="getLocation()">📍 Lấy vị trí của tôi</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">
<label>Công suất hệ thống (kWp)</label>
<input type="number" id="capacity" value="5" style="width:100%;padding:8px;margin:8px 0;border-radius:6px;border:none;">
<button onclick="calculate()">TÍNH SẢN LƯỢNG</button>

<div class="result" id="result" style="display:none;"></div>
</div>

</div>

<footer>
Hotline: 0981 825 636 | info@giahansolutions.io.vn
</footer>

<a href="https://m.me/669698252892555" target="_blank">
<div class="float messenger">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</div>
</a>

<a href="https://zalo.me/0981825636" target="_blank">
<div class="float zalo">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
</div>
</a>

<script>

let lat=null;
let lon=null;
let markerLayer;

const map=new ol.Map({
target:'map',
layers:[new ol.layer.Tile({source:new ol.source.OSM()})],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

function addMarker(lonVal,latVal){
if(markerLayer) map.removeLayer(markerLayer);
const marker=new ol.Feature({
geometry:new ol.geom.Point(ol.proj.fromLonLat([lonVal,latVal]))
});
markerLayer=new ol.layer.Vector({
source:new ol.source.Vector({features:[marker]})
});
map.addLayer(markerLayer);
}

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];
addMarker(lon,lat);
document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

map.getView().animate({
center:ol.proj.fromLonLat([lon,lat]),
zoom:15
});

addMarker(lon,lat);

document.getElementById("coords").innerText=
`Vị trí của bạn: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});
}

async function calculate(){

if(!lat){
alert("Vui lòng chọn vị trí");
return;
}

const capacity=document.getElementById("capacity").value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}`);
const data=await res.json();

if(data.error){
alert("Lỗi lấy dữ liệu PVGIS");
return;
}

const energy=data.outputs.totals.fixed.E_y;
const irr=data.outputs.totals.fixed["H(i)_y"];

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=
`<p>Bức xạ: ${irr.toFixed(0)} kWh/m²/năm</p>
<div class="big">${energy.toFixed(0)} kWh/năm</div>
<p>≈ ${(energy/12).toFixed(0)} kWh/tháng</p>`;
}

</script>

</body>
</html>
