<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | EPC Solar Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}
h1{text-align:center;color:#00ffd5;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
grid-template-rows:auto auto;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
}

#map{
width:100%;
height:450px;
min-height:450px;
border-radius:15px;
}

.layer-switch{
margin-bottom:10px;
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:10px;
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.chart-panel{
grid-column:1 / span 2;
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:25px;
display:none;
opacity:0;
transform:translateY(30px);
transition:0.7s;
}

.chart-panel.show{
opacity:1;
transform:translateY(0);
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

canvas{
width:100%!important;
height:350px!important;
}

@media(max-width:1000px){
.wrapper{grid-template-columns:1fr;}
.chart-grid{grid-template-columns:1fr;}
#map{height:350px;}
}
</style>
</head>

<body>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">EPC Solar Yield Calculator</p>

<div class="wrapper">

<div class="panel">
<div class="layer-switch">
<button onclick="switchLayer('osm')">OSM</button>
<button onclick="switchLayer('sat')">Satellite</button>
</div>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>
</div>

<div class="panel">

<h3>Thông tin khách hàng</h3>
<input type="text" id="customerName" placeholder="Tên khách hàng">
<input type="text" id="customerPhone" placeholder="Số điện thoại">
<input type="text" id="projectName" placeholder="Tên dự án">

<hr>

<label>Công suất (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Hướng (°)</label>
<input type="number" id="aspect" value="0">

<label>Tổn hao (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">PHÂN TÍCH EPC</button>
<button onclick="exportPDF()">XUẤT PDF</button>

<div class="result" id="result"></div>

</div>

<div class="chart-panel" id="chartPanel">
<h3>Biểu đồ phân tích</h3>
<div class="chart-grid">
<canvas id="energyChart"></canvas>
<canvas id="compareChart"></canvas>
</div>
</div>

</div>

<script>

let lat=null,lon=null;
let markerLayer;
let energyChart=null,compareChart=null;

/* ==== MAP LAYERS ==== */
const osmLayer=new ol.layer.Tile({
source:new ol.source.OSM()
});

const satelliteLayer=new ol.layer.Tile({
source:new ol.source.XYZ({
url:'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
})
});

const map=new ol.Map({
target:'map',
layers:[osmLayer],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

function switchLayer(type){
map.getLayers().setAt(0,type==='sat'?satelliteLayer:osmLayer);
}

/* ==== MARKER ==== */
map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];

document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

if(markerLayer) map.removeLayer(markerLayer);

const marker=new ol.Feature({
geometry:new ol.geom.Point(evt.coordinate)
});

markerLayer=new ol.layer.Vector({
source:new ol.source.Vector({features:[marker]})
});

map.addLayer(markerLayer);
});

setTimeout(()=>map.updateSize(),500);
window.addEventListener("resize",()=>setTimeout(()=>map.updateSize(),300));

/* ==== CALCULATE ==== */
async function calculate(){

if(!lat){alert("Chọn vị trí trên bản đồ");return;}

const capacity=capacity.value;
const angle=angle.value;
const aspect=aspect.value;
const loss=loss.value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&aspect=${aspect}&loss=${loss}`);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed["H(i)_y"];
const monthly=data.outputs.monthly.fixed;

let labels=[],energyValues=[],irradiationValues=[];
monthly.forEach(m=>{
labels.push("T"+m.month);
energyValues.push(m.E_m);
irradiationValues.push(m["H(i)_m"]);
});

result.innerHTML=`
<h3>Kết quả</h3>
<p>Sản lượng năm: ${energy.toFixed(0)} kWh</p>
<p>Irradiation năm: ${irradiation.toFixed(0)} kWh/m²</p>
`;
result.classList.add("show");

chartPanel.style.display="block";
setTimeout(()=>{
chartPanel.classList.add("show");
map.updateSize();
},200);

if(energyChart) energyChart.destroy();
if(compareChart) compareChart.destroy();

energyChart=new Chart(energyChart=document.getElementById("energyChart"),{
type:'bar',
data:{labels:labels,datasets:[{label:'Energy (kWh)',data:energyValues}]},
options:{responsive:true,animation:{duration:1500}}
});

compareChart=new Chart(compareChart=document.getElementById("compareChart"),{
type:'line',
data:{
labels:labels,
datasets:[
{label:'Irradiation',data:irradiationValues,yAxisID:'y1'},
{label:'Energy',data:energyValues,yAxisID:'y2'}
]
},
options:{
responsive:true,
animation:{duration:1800},
scales:{
y1:{position:'left'},
y2:{position:'right'}
}
}
});

window.calculatedData={energy,irradiation,monthly};

}

/* ==== EXPORT PDF ==== */
async function exportPDF(){

if(!window.calculatedData){alert("Chưa có dữ liệu");return;}

const {jsPDF}=window.jspdf;
const doc=new jsPDF();

const name=customerName.value;
const phone=customerPhone.value;
const project=projectName.value;

doc.setFontSize(16);
doc.text("GIA HAN SOLUTIONS - EPC REPORT",20,20);

doc.setFontSize(12);
doc.text(`Khách hàng: ${name}`,20,35);
doc.text(`SĐT: ${phone}`,20,42);
doc.text(`Dự án: ${project}`,20,49);

doc.text(`Sản lượng năm: ${window.calculatedData.energy.toFixed(0)} kWh`,20,65);
doc.text(`Irradiation năm: ${window.calculatedData.irradiation.toFixed(0)} kWh/m²`,20,72);

let y=90;
doc.text("Sản lượng tháng:",20,y);
y+=8;

window.calculatedData.monthly.forEach(m=>{
doc.text(`Tháng ${m.month}: ${m.E_m.toFixed(0)} kWh`,20,y);
y+=7;
});

doc.save("EPC_Report_GiaHanSolutions.pdf");
}

</script>

</body>
</html>
