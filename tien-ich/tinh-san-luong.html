<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính Sản Lượng Điện Mặt Trời | Gia Han Solutions</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:#fff;
margin:0;
padding:30px;
}

h2{color:#00ffd5}

.container{
max-width:1100px;
margin:auto;
}

input,button{
padding:8px;
margin:5px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
background:#00ffd5;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:10px;
}

.epc-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.epc-card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:10px;
font-size:14px;
}

.epc-card .label{
color:#aaa;
font-size:12px;
}

.highlight{
background:rgba(0,255,213,0.2);
}

.month-table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

.month-table td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

footer{
margin-top:40px;
text-align:center;
font-size:13px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h2>GIA HAN SOLUTIONS</h2>
<p>Công cụ tính toán sản lượng & tài chính điện mặt trời (EPC)</p>

<label>Latitude</label>
<input id="lat" value="21.0285">

<label>Longitude</label>
<input id="lon" value="105.8542">

<label>Công suất (kWp)</label>
<input id="capacity" value="10">

<label>Góc nghiêng (°)</label>
<input id="angle" value="15">

<label>Hướng (°)</label>
<input id="aspect" value="0">

<label>Loss (%)</label>
<input id="loss" value="14">

<hr>

<h3>Phân tích tài chính</h3>

<label>Suất đầu tư (VNĐ/kWp)</label>
<input id="capexkwp" value="15000000">

<label>Giá điện (VNĐ/kWh)</label>
<input id="tariff" value="2500">

<label>Chiết khấu (%)</label>
<input id="discount" value="10">

<label>Suy giảm (%/năm)</label>
<input id="degradation" value="0.5">

<button onclick="calculate()">Tính toán</button>
<button onclick="exportPDF()">Xuất PDF Proposal</button>

<div id="result" class="result"></div>

<canvas id="monthlyChart"></canvas>

</div>

<footer>
Gia Han Solutions – EPC điện mặt trời<br>
Hotline: 0981 825 636<br>
https://giahansolutions.io.vn
</footer>

<script>
function formatNumber(num){
return Number(num).toLocaleString('vi-VN');
}

async function calculate(){

const lat = document.getElementById("lat").value;
const lon = document.getElementById("lon").value;
const capacity = document.getElementById("capacity").value;
const angle = document.getElementById("angle").value;
const aspect = document.getElementById("aspect").value;
const loss = document.getElementById("loss").value;

const response = await fetch(`https://re.jrc.ec.europa.eu/api/v5_2/PVcalc?lat=${lat}&lon=${lon}&peakpower=${capacity}&loss=${loss}&angle=${angle}&aspect=${aspect}&outputformat=json`);
const data = await response.json();

window.energy = data.outputs.totals.fixed.E_y;
window.monthly = data.outputs.monthly.fixed;
window.irradiation = data.outputs.totals.fixed["H(i)_y"];

const specificYield = energy/capacity;
const capacityFactor = energy/(capacity*8760);
const PR = energy/(irradiation*capacity);
const P90 = energy*0.95;

const capex = capacity * document.getElementById("capexkwp").value;
const tariff = document.getElementById("tariff").value;
const discount = document.getElementById("discount").value/100;
const degradation = document.getElementById("degradation").value/100;

let cashflows=[-capex];
let yearlyEnergy=energy;

for(let i=1;i<=20;i++){
cashflows.push(yearlyEnergy*tariff);
yearlyEnergy*=(1-degradation);
}

function npv(rate,cf){
return cf.reduce((a,c,i)=>a+c/Math.pow(1+rate,i),0);
}

function irr(cf){
let guess=0.1;
for(let i=0;i<1000;i++){
let f=npv(guess,cf);
let df=(npv(guess+0.0001,cf)-f)/0.0001;
guess-=f/df;
}
return guess;
}

const NPV=npv(discount,cashflows);
const IRR=irr(cashflows);

document.getElementById("result").innerHTML=`
<div class="epc-grid">
<div class="epc-card highlight"><div class="label">Annual Yield</div>${formatNumber(energy.toFixed(0))} kWh</div>
<div class="epc-card"><div class="label">Specific Yield</div>${formatNumber(specificYield.toFixed(0))}</div>
<div class="epc-card"><div class="label">PR</div>${(PR*100).toFixed(1)}%</div>
<div class="epc-card"><div class="label">Capacity Factor</div>${(capacityFactor*100).toFixed(2)}%</div>
<div class="epc-card"><div class="label">P90</div>${formatNumber(P90.toFixed(0))}</div>
<div class="epc-card"><div class="label">NPV</div>${formatNumber(NPV.toFixed(0))} VNĐ</div>
<div class="epc-card"><div class="label">IRR</div>${(IRR*100).toFixed(2)}%</div>
</div>
`;

if(window.chart) chart.destroy();
window.chart=new Chart(document.getElementById("monthlyChart"),{
type:'bar',
data:{
labels:monthly.map(m=>m.month),
datasets:[{data:monthly.map(m=>m.E_m)}]
}
});

}

async function exportPDF(){

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();

const lat=document.getElementById("lat").value;
const lon=document.getElementById("lon").value;

const mapUrl=`https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lon}&zoom=18&size=600x300&maptype=satellite&markers=color:red%7C${lat},${lon}&key=YOUR_GOOGLE_MAP_KEY`;

const img=await fetch(mapUrl).then(r=>r.blob()).then(b=>new Promise(res=>{
const reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(b);
}));

pdf.setFontSize(16);
pdf.text("GIA HAN SOLUTIONS",20,20);
pdf.setFontSize(12);
pdf.text("BÁO CÁO PHÂN TÍCH ĐIỆN MẶT TRỜI",20,30);

pdf.addImage(img,'PNG',20,40,170,70);

pdf.text(`Annual Yield: ${formatNumber(energy.toFixed(0))} kWh`,20,120);
pdf.text(`P90: ${formatNumber((energy*0.95).toFixed(0))} kWh`,20,130);

pdf.text("Cam kết kỹ thuật:",20,150);
pdf.text("- Thiết kế theo IEC & TCVN",25,160);
pdf.text("- Sai số sản lượng ±5%",25,170);
pdf.text("- Bảo hành module 25 năm hiệu suất",25,180);

pdf.save("Proposal-Gia-Han-Solutions.pdf");
}
</script>

</body>
</html>
