<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Solutions | EPC Solar Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:#fff;padding:30px;}

h1{text-align:center;color:#00ffd5;margin-bottom:5px;}
.subtitle{text-align:center;color:#aaa;margin-bottom:25px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:1400px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
position:relative;
}

#map{width:100%;height:450px;border-radius:15px;}

.chart-box{
margin-top:25px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
}

select,input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00ffd5;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:10px;
}

.toggle-map{
position:absolute;
top:15px;
right:15px;
width:auto;
padding:6px 12px;
font-size:13px;
background:#222;
color:#00ffd5;
border:1px solid #00ffd5;
}

.result{
margin-top:15px;
padding:20px;
background:rgba(0,255,213,0.1);
border-radius:12px;
}

footer{
margin-top:60px;
padding:30px;
background:rgba(255,255,255,0.05);
border-top:1px solid rgba(255,255,255,0.1);
text-align:center;
font-size:14px;
color:#aaa;
}

footer .brand{
color:#00ffd5;
font-weight:600;
font-size:16px;
margin-bottom:8px;
}
</style>
</head>

<body>

<a href="/" class="home-btn" style="position:absolute;top:20px;left:20px;color:#00ffd5;text-decoration:none;font-weight:600;">← Trang chủ</a>

<h1>GIA HAN SOLUTIONS</h1>
<p class="subtitle">EPC Solar Yield Calculator – Residential & C&I</p>

<div class="wrapper">

<div class="panel">
<button onclick="getLocation()">📍 Lấy vị trí</button>
<button class="toggle-map" onclick="toggleMap()">Satellite</button>
<div id="map"></div>
<p id="coords">Chưa chọn vị trí</p>

<div class="chart-box">
<canvas id="monthlyChart"></canvas>
</div>

<div class="chart-box">
<canvas id="irrChart"></canvas>
</div>

</div>

<div class="panel">

<label>Công suất DC (kWp)</label>
<input type="number" id="capacity" value="5">

<label>Góc nghiêng (°)</label>
<input type="number" id="angle" value="15">

<label>Hướng (°) – 0 = Nam</label>
<input type="number" id="aspect" value="0">

<label>Tổn hao (%)</label>
<input type="number" id="loss" value="14">

<button onclick="calculate()">PHÂN TÍCH EPC</button>

<div class="result" id="result" style="display:none;"></div>

</div>
</div>

<script>
let lat=null;
let lon=null;
let satellite=false;
let monthlyChart, irrChart;

const osmLayer=new ol.layer.Tile({source:new ol.source.OSM()});
const satLayer=new ol.layer.Tile({
source:new ol.source.XYZ({
url:'https://{a-c}.tile.opentopomap.org/{z}/{x}/{y}.png'
})
});

const map=new ol.Map({
target:'map',
layers:[osmLayer],
view:new ol.View({
center:ol.proj.fromLonLat([106,16]),
zoom:6
})
});

function toggleMap(){
satellite=!satellite;
map.getLayers().setAt(0,satellite?satLayer:osmLayer);
}

map.on('click',function(evt){
const coord=ol.proj.toLonLat(evt.coordinate);
lon=coord[0];
lat=coord[1];
document.getElementById("coords").innerText=
`Vị trí: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;
map.getView().animate({
center:ol.proj.fromLonLat([lon,lat]),
zoom:15
});
});
}

async function calculate(){
if(!lat){alert("Chọn vị trí trước");return;}

const capacity=document.getElementById("capacity").value;
const angle=document.getElementById("angle").value;
const aspect=document.getElementById("aspect").value;
const loss=document.getElementById("loss").value;

const res=await fetch(`/api/pvgis?lat=${lat}&lon=${lon}&peakpower=${capacity}&angle=${angle}&aspect=${aspect}&loss=${loss}`);
const data=await res.json();

const energy=data.outputs.totals.fixed.E_y;
const irradiation=data.outputs.totals.fixed["H(i)_y"];
const monthly=data.outputs.monthly.fixed;

let months=[];
let energies=[];
let irrs=[];

monthly.forEach(m=>{
months.push("T"+m.month);
energies.push(m.E_m);
irrs.push(m["H(i)_m"]);
});

if(monthlyChart) monthlyChart.destroy();
if(irrChart) irrChart.destroy();

monthlyChart=new Chart(document.getElementById("monthlyChart"),{
type:'bar',
data:{
labels:months,
datasets:[{
label:'Sản lượng (kWh)',
data:energies
}]
}
});

irrChart=new Chart(document.getElementById("irrChart"),{
type:'line',
data:{
labels:months,
datasets:[{
label:'Bức xạ (kWh/m²)',
data:irrs
}]
}
});

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=`
<h3>Kết quả EPC</h3>
<p><b>Annual Yield:</b> ${energy.toFixed(0)} kWh</p>
<p><b>PR xấp xỉ:</b> ${(energy/(irradiation*capacity)*100).toFixed(1)}%</p>
`;
}
</script>

<footer>
  <div class="brand">GIA HAN SOLUTIONS</div>
  <div>Đơn vị EPC điện mặt trời dân dụng & C&I</div>
  <div>Thiết kế – Thi công – Giám sát – Tối ưu vận hành</div>
  <div>Hotline: 0981 825 636 | admin@giahansolutions.io.vn</div>
  <div>© 2026 Gia Han Solutions</div>
</footer>

</body>
</html>
