<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Weather Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--primary:#00ffd5;
--bg:#0f2027;
--border:rgba(0,255,213,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:#fff;overflow:hidden;}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.4);
border-bottom:1px solid var(--border);
}

.main-layout{
display:flex;
height:calc(100vh - 70px);
gap:20px;
padding:20px;
}

.sidebar{
width:380px;
background:rgba(0,0,0,0.45);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
overflow-y:auto;
transition:.4s;
}

.sidebar.collapsed{
width:0;
padding:0;
border:none;
overflow:hidden;
}

.card{
margin-bottom:20px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:15px;
border:1px solid var(--border);
}

.card-header{
color:var(--primary);
font-weight:600;
margin-bottom:10px;
}

.temp-main{
font-size:3rem;
font-weight:700;
text-align:center;
margin:10px 0;
}

.detail-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.detail-item{
background:rgba(0,0,0,0.3);
padding:8px;
border-radius:10px;
text-align:center;
font-size:.85rem;
}

.map-zone{
flex:1;
position:relative;
border-radius:20px;
overflow:hidden;
background:#0b1a20;
}

.map-frame{
width:100%;
height:100%;
border:none;
display:none;
opacity:0;
transition:opacity .4s ease;
}

.chart-overlay{
position:absolute;
bottom:20px;
left:20px;
right:20px;
height:220px;
background:rgba(0,0,0,0.65);
border-radius:15px;
padding:15px;
border:1px solid var(--border);
transition:opacity .4s, transform .4s;
}

.chart-overlay.fade-out{
opacity:0;
transform:translateY(10px);
}

.chart-overlay.fade-in{
opacity:1;
transform:translateY(0);
}

.toggle-btn{
position:absolute;
top:20px;
left:20px;
z-index:1000;
padding:10px 15px;
background:var(--primary);
color:#000;
border:none;
border-radius:30px;
cursor:pointer;
}

.layer-control{
position:absolute;
top:20px;
right:20px;
z-index:1000;
display:flex;
gap:10px;
}

.layer-control button{
padding:8px 14px;
border-radius:20px;
border:1px solid var(--primary);
background:rgba(0,0,0,0.6);
color:var(--primary);
cursor:pointer;
transition:.3s;
}

.layer-control button:hover{
background:var(--primary);
color:#000;
}

.risk-low{color:#00ff88;font-weight:600;}
.risk-medium{color:#ffd000;font-weight:600;}
.risk-high{color:#ff4d4d;font-weight:600;}

footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.6);
border-top:1px solid var(--border);
padding:8px 20px;
font-size:12px;
display:flex;
justify-content:space-between;
color:#aaa;
}
  /* Nút về trang chủ */
.home-btn{
position:fixed;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:8px;
padding:10px 16px;
border-radius:14px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
border:1px solid rgba(0,255,213,0.5);
color:#00ffd5;
text-decoration:none;
font-weight:600;
z-index:1000;
transition:all 0.3s ease;
}

.home-btn:hover{
background:#00ffd5;
color:#000;
box-shadow:0 6px 20px rgba(0,255,213,0.4);
transform:translateY(-2px);
}

.home-btn svg{
width:18px;
height:18px;
}
</style>
</head>

<body>
<a href="/" class="home-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
  Trang chủ
</a>
<div class="top-bar">
<h2>Gia Han Weather Pro 
<span id="live-time" style="font-size:14px;color:#00ffd5;margin-left:10px;"></span>
</h2>
<select id="city-select">
<option value="19.80,105.77">Thanh Hóa</option>
<option value="21.02,105.83">Hà Nội</option>
<option value="10.82,106.63">TP.HCM</option>
<option value="16.05,108.20">Đà Nẵng</option>
</select>
</div>

<div class="main-layout">

<div class="sidebar" id="sidebar">

<div class="card">
<div class="card-header">Thời tiết hiện tại</div>
<div class="temp-main"><span id="curr-temp">--</span>°C</div>
<div id="weather-status" style="text-align:center;margin-bottom:10px;color:#00ffd5;font-weight:600;"></div>
<div class="detail-grid">
<div class="detail-item">Độ ẩm<br><b id="hum">--%</b></div>
<div class="detail-item">Áp suất<br><b id="pres">--</b></div>
<div class="detail-item">UV<br><b id="uv">--</b></div>
<div class="detail-item">Solar<br><b id="solar">--</b></div>
</div>
</div>

<div class="card">
<div class="card-header">Dự báo 7 ngày & Rủi ro NLMT</div>
<div id="forecast-list"></div>
</div>

</div>

<div class="map-zone">

<button class="toggle-btn" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<div class="layer-control">
<button onclick="changeLayer('clouds')">☁</button>
<button onclick="changeLayer('rain')">🌧</button>
<button onclick="changeLayer('wind')">💨</button>
</div>

<iframe id="windy-map" class="map-frame"></iframe>

<div class="chart-overlay">
<canvas id="mainChart"></canvas>
</div>

</div>
</div>

<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:9999;">
<div style="background:#1a2a30;padding:25px;border-radius:15px;width:420px;border:1px solid #00ffd5;">
<h3 id="modal-date" style="color:#00ffd5;margin-bottom:15px;"></h3>
<div id="modal-body" style="line-height:1.8;"></div>
<button onclick="closeModal()" style="margin-top:15px;padding:8px 15px;background:#00ffd5;border:none;border-radius:20px;cursor:pointer;">
Đóng
</button>
</div>
</div>

<footer>
<div>© 2026 Gia Han Solutions | Weather Intelligence</div>
<div>Dữ liệu: Open-Meteo | Radar: Windy</div>
</footer>

<script>
let mainChart=null;
let weatherData=null;
let currentLayer="clouds";
let currentLat=19.80;
let currentLon=105.77;

function updateLiveTime(){
const now=new Date();
document.getElementById("live-time").innerText=now.toLocaleTimeString("vi-VN");
}
setInterval(updateLiveTime,1000);
updateLiveTime();

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("collapsed");
}

function changeLayer(layer){
currentLayer=layer;
updateMap();
}

function updateMap(){
const map=document.getElementById("windy-map");

map.style.display="none";
map.style.opacity=0;

map.src=`https://embed.windy.com/embed2.html?lat=${currentLat}&lon=${currentLon}&zoom=6&overlay=${currentLayer}&product=ecmwf&metricWind=km%2Fh&metricTemp=%C2%B0C`;

map.onload=function(){
map.style.display="block";
setTimeout(()=>{ map.style.opacity=1; },100);
};
}

function getWeatherText(code){
if(code===0) return "☀ Trời nắng";
if([1,2,3].includes(code)) return "⛅ Có mây";
if([61,63,65,80,81,82].includes(code)) return "🌧 Mưa";
if([95,96,99].includes(code)) return "⚡ Giông";
return "⛅ Khác";
}

function evaluateSolarRisk(radiation,code){
if(radiation>20 && code===0) return {text:"🟢 Rủi ro thấp",class:"risk-low"};
if(radiation>10) return {text:"🟡 Rủi ro trung bình",class:"risk-medium"};
return {text:"🔴 Rủi ro cao",class:"risk-high"};
}

async function fetchData(lat,lon){
currentLat=lat;
currentLon=lon;
updateMap();

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,shortwave_radiation,surface_pressure,weathercode&hourly=temperature_2m,shortwave_radiation&daily=temperature_2m_max,temperature_2m_min,uv_index_max,weathercode,shortwave_radiation_sum&timezone=Asia%2FBangkok`;

const res=await fetch(url);
weatherData=await res.json();
renderDashboard();
}

function renderDashboard(){

document.getElementById("curr-temp").innerText=Math.round(weatherData.current.temperature_2m);
document.getElementById("hum").innerText=weatherData.current.relative_humidity_2m+"%";
document.getElementById("pres").innerText=weatherData.current.surface_pressure;
document.getElementById("solar").innerText=Math.round(weatherData.current.shortwave_radiation);
document.getElementById("uv").innerText=weatherData.daily.uv_index_max[0];
document.getElementById("weather-status").innerText=getWeatherText(weatherData.current.weathercode);

const list=document.getElementById("forecast-list");
list.innerHTML="";

weatherData.daily.time.forEach((t,i)=>{
const status=getWeatherText(weatherData.daily.weathercode[i]);
const risk=evaluateSolarRisk(
weatherData.daily.shortwave_radiation_sum[i],
weatherData.daily.weathercode[i]
);

list.innerHTML+=`
<div onclick="openModal(${i})"
style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;">
${t} — ${Math.round(weatherData.daily.temperature_2m_max[i])}° /
${Math.round(weatherData.daily.temperature_2m_min[i])}° 
<br><span style="font-size:12px;color:#00ffd5;">${status}</span>
<br><span class="${risk.class}" style="font-size:12px;">${risk.text}</span>
</div>`;
});

}

function openModal(index){
const d=weatherData.daily;
const risk=evaluateSolarRisk(
d.shortwave_radiation_sum[index],
d.weathercode[index]
);

document.getElementById("modal-date").innerText="Chi tiết ngày "+d.time[index];
document.getElementById("modal-body").innerHTML=`
<b>Trạng thái:</b> ${getWeatherText(d.weathercode[index])}<br>
<b>Nhiệt độ cao nhất:</b> ${d.temperature_2m_max[index]}°C<br>
<b>Nhiệt độ thấp nhất:</b> ${d.temperature_2m_min[index]}°C<br>
<b>UV tối đa:</b> ${d.uv_index_max[index]}<br>
<b>Bức xạ ngày:</b> ${d.shortwave_radiation_sum[index]} MJ/m²<br>
<b class="${risk.class}">${risk.text}</b>
`;

document.getElementById("detailModal").style.display="flex";
}

function closeModal(){
document.getElementById("detailModal").style.display="none";
}

document.getElementById("city-select").onchange=function(){
const [lat,lon]=this.value.split(",");
fetchData(lat,lon);
};

fetchData(19.80,105.77);
</script>

</body>
</html>
