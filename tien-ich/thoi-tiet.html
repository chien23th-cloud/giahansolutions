<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Han Weather Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--primary:#00ffd5;
--bg:#0f2027;
--border:rgba(0,255,213,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:#fff;overflow:hidden;}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.4);
border-bottom:1px solid var(--border);
}

.main-layout{
display:flex;
height:calc(100vh - 70px);
gap:20px;
padding:20px;
transition:all .4s ease;
}

/* SIDEBAR */
.sidebar{
width:380px;
background:rgba(0,0,0,0.45);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
overflow-y:auto;
backdrop-filter:blur(20px);
transition:all .4s ease;
}

.sidebar.collapsed{
width:0;
padding:0;
border:none;
overflow:hidden;
}

.card{
margin-bottom:20px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:15px;
border:1px solid var(--border);
transition:all .3s ease;
}

.card-header{
color:var(--primary);
font-weight:600;
margin-bottom:10px;
}

.temp-main{
font-size:3rem;
font-weight:700;
text-align:center;
margin:10px 0;
}

.detail-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.detail-item{
background:rgba(0,0,0,0.3);
padding:8px;
border-radius:10px;
text-align:center;
font-size:.85rem;
}

/* MAP ZONE */
.map-zone{
flex:1;
position:relative;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
}

.map-frame{
width:100%;
height:100%;
border:none;
transition:opacity .4s ease;
}

/* CHART OVERLAY */
.chart-overlay{
position:absolute;
bottom:20px;
left:20px;
right:20px;
height:220px;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(15px);
border-radius:15px;
padding:15px;
border:1px solid var(--border);
transition:opacity .4s ease, transform .4s ease;
}

.chart-overlay.fade-out{
opacity:0;
transform:translateY(10px);
}

.chart-overlay.fade-in{
opacity:1;
transform:translateY(0);
}

/* TOGGLE BUTTON */
.toggle-btn{
position:absolute;
top:20px;
left:20px;
z-index:1000;
padding:10px 15px;
background:var(--primary);
color:#000;
border:none;
border-radius:30px;
cursor:pointer;
}

/* LAYER CONTROL */
.layer-control{
position:absolute;
top:20px;
right:20px;
z-index:1000;
display:flex;
gap:10px;
}

.layer-control button{
padding:8px 14px;
border-radius:20px;
border:1px solid var(--primary);
background:rgba(0,0,0,0.6);
color:var(--primary);
cursor:pointer;
transition:.3s;
}

.layer-control button:hover{
background:var(--primary);
color:#000;
}
</style>
</head>

<body>

<div class="top-bar">
<h2>Gia Han Weather Pro</h2>
<select id="city-select">
<option value="19.80,105.77">Thanh Hóa</option>
<option value="21.02,105.83">Hà Nội</option>
<option value="10.82,106.63">TP.HCM</option>
<option value="16.05,108.20">Đà Nẵng</option>
</select>
</div>

<div class="main-layout">

<div class="sidebar" id="sidebar">

<div class="card">
<div class="card-header">Thời tiết hiện tại</div>
<div class="temp-main"><span id="curr-temp">--</span>°C</div>
<div class="detail-grid">
<div class="detail-item">Độ ẩm<br><b id="hum">--%</b></div>
<div class="detail-item">Áp suất<br><b id="pres">--</b></div>
<div class="detail-item">UV<br><b id="uv">--</b></div>
<div class="detail-item">Solar<br><b id="solar">--</b></div>
</div>
</div>

<div class="card">
<div class="card-header">Dự báo 7 ngày</div>
<div id="forecast-list"></div>
</div>

</div>

<div class="map-zone">

<button class="toggle-btn" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<div class="layer-control">
<button onclick="changeLayer('clouds')">☁</button>
<button onclick="changeLayer('rain')">🌧</button>
<button onclick="changeLayer('wind')">💨</button>
</div>

<iframe id="windy-map" class="map-frame"></iframe>

<div class="chart-overlay">
<canvas id="mainChart"></canvas>
</div>

</div>
</div>

<script>
let mainChart=null;
let weatherData=null;
let currentLayer="clouds";
let currentLat=19.80;
let currentLon=105.77;

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("collapsed");
}

function changeLayer(layer){
currentLayer=layer;
updateMap();
}

function updateMap(){
const map=document.getElementById("windy-map");
map.style.opacity=0;
setTimeout(()=>{
map.src=`https://embed.windy.com/embed2.html?lat=${currentLat}&lon=${currentLon}&zoom=6&overlay=${currentLayer}&product=ecmwf&metricWind=km%2Fh&metricTemp=%C2%B0C`;
map.style.opacity=1;
},300);
}

async function fetchData(lat,lon){
currentLat=lat;
currentLon=lon;
updateMap();

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,shortwave_radiation,surface_pressure&hourly=temperature_2m,shortwave_radiation&daily=temperature_2m_max,temperature_2m_min,uv_index_max&timezone=Asia%2FBangkok`;

const res=await fetch(url);
weatherData=await res.json();
renderDashboard();
}

function renderDashboard(){

document.getElementById("curr-temp").innerText=Math.round(weatherData.current.temperature_2m);
document.getElementById("hum").innerText=weatherData.current.relative_humidity_2m+"%";
document.getElementById("pres").innerText=weatherData.current.surface_pressure;
document.getElementById("solar").innerText=Math.round(weatherData.current.shortwave_radiation);
document.getElementById("uv").innerText=weatherData.daily.uv_index_max[0];

const chartBox=document.querySelector(".chart-overlay");
chartBox.classList.add("fade-out");

setTimeout(()=>{

if(mainChart) mainChart.destroy();

const ctx=document.getElementById("mainChart");
mainChart=new Chart(ctx,{
type:"line",
data:{
labels:weatherData.hourly.time.slice(6,20).map(t=>t.split("T")[1]),
datasets:[
{
label:"Bức xạ",
data:weatherData.hourly.shortwave_radiation.slice(6,20),
borderColor:"#ffcc00",
fill:true,
backgroundColor:"rgba(255,204,0,0.1)",
tension:.4
},
{
label:"Nhiệt độ",
data:weatherData.hourly.temperature_2m.slice(6,20),
borderColor:"#00ffd5",
tension:.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{duration:800,easing:"easeOutQuart"}
}
});

chartBox.classList.remove("fade-out");
chartBox.classList.add("fade-in");

},400);

const list=document.getElementById("forecast-list");
list.innerHTML="";
weatherData.daily.time.forEach((t,i)=>{
list.innerHTML+=`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
${t} — ${Math.round(weatherData.daily.temperature_2m_max[i])}° / ${Math.round(weatherData.daily.temperature_2m_min[i])}°
</div>`;
});
}

document.getElementById("city-select").onchange=function(){
const [lat,lon]=this.value.split(",");
fetchData(lat,lon);
};

fetchData(19.80,105.77);
</script>

</body>
</html>
