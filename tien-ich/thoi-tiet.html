<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Han Solutions | Integrated Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #00ffd5;
            --bg: #0f2027;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 213, 0.2);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 50px; }
        .container { max-width: 1600px; margin: auto; padding: 20px 2%; }

        /* TOP BAR */
        .top-bar { 
            display: grid; 
            grid-template-columns: 1fr 2fr 1fr; 
            align-items: center; 
            margin-bottom: 30px; 
            padding: 15px 25px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .clock-box { text-align: left; }
        #digital-clock { font-size: 1.8rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
        #date-display, #lunar-display { font-size: 0.85rem; color: #aaa; }

        header { text-align: center; } /* Căn giữa toàn bộ header */
        header h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(90deg, var(--primary), #00bfff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 5px;
        }
        .header-subtext {
            font-size: 0.75rem; 
            color: var(--primary); 
            letter-spacing: 1px;
            text-align: center; /* Căn giữa nội dung phụ */
            display: block;
            width: 100%;
        }

        /* GRID LAYOUT */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr 380px; gap: 20px; align-items: start; }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .card-header { color: var(--primary); font-size: 0.85rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .temp-main { font-size: 4rem; font-weight: 700; text-align: center; margin: 15px 0; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-node { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        
        .forecast-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .forecast-item:hover { background: rgba(0, 255, 213, 0.1); border-radius: 10px; }

        .map-frame { width: 100%; height: 350px; border-radius: 15px; border: 1px solid var(--border); }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: #1a2a30; margin: 10% auto; padding: 30px; border: 1px solid var(--primary); width: 420px; border-radius: 25px; position: relative; text-align: center; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 24px; cursor: pointer; color: var(--primary); }

        .select-city { width: 100%; padding: 10px; background: #000; border: 1px solid var(--primary); color: #fff; border-radius: 10px; }

        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr; } .top-bar { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="clock-box" data-aos="fade-right">
            <div id="digital-clock">00:00:00</div>
            <div id="date-display">Ngày tháng năm</div>
            <div id="lunar-display" style="color: var(--primary); font-weight: 600;">Lịch âm: Đang tính...</div>
        </div>
        <header data-aos="fade-down">
            <h1>Gia Han Solutions</h1>
            <span class="header-subtext">TRUNG TÂM GIÁM SÁT NĂNG LƯỢNG & KHÍ TƯỢNG</span>
        </header>
        <div style="text-align: right;" data-aos="fade-left">
            <select id="city-select" class="select-city">
                <option value="19.80,105.77">Thanh Hóa (HQ)</option>
                <option value="21.02,105.83">Hà Nội</option>
                <option value="10.82,106.63">TP. Hồ Chí Minh</option>
                <option value="16.05,108.20">Đà Nẵng</option>
            </select>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="col-1">
            <div class="card" data-aos="fade-right">
                <div class="card-header"><i class="fas fa-satellite"></i> Thông số trạm đo</div>
                <div class="temp-main"><span id="curr-temp">--</span>°C</div>
                <div class="stat-grid">
                    <div class="stat-node"><i class="fas fa-sun"></i><br><small>Bức xạ</small><br><b id="curr-solar">--</b></div>
                    <div class="stat-node"><i class="fas fa-shield-alt"></i><br><small>UV</small><br><b id="curr-uv">--</b></div>
                </div>
            </div>
            <div class="card" data-aos="fade-right">
                <div class="card-header"><i class="fas fa-wind"></i> Gió & Độ ẩm</div>
                <div class="stat-grid">
                    <div class="stat-node">Gió: <b id="curr-wind">--</b> <small>km/h</small></div>
                    <div class="stat-node">Ẩm: <b id="curr-hum">--</b>%</div>
                </div>
            </div>
        </div>

        <div class="col-2">
            <div class="card" data-aos="fade-up">
                <div class="card-header"><i class="fas fa-chart-line"></i> Phân tích 24h</div>
                <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="card" data-aos="fade-up">
                <div class="card-header"><i class="fas fa-map"></i> Radar vệ tinh</div>
                <iframe id="windy-map" class="map-frame" src="" frameborder="0"></iframe>
            </div>
        </div>

        <div class="col-3">
            <div class="card" data-aos="fade-left">
                <div class="card-header"><i class="fas fa-calendar-alt"></i> Dự báo 7 ngày</div>
                <div id="forecast-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-date" style="color: var(--primary); margin-bottom: 20px;"></h2>
        <div id="modal-body" style="text-align: left; line-height: 2;"></div>
    </div>
</div>

<script src="https://momentjs.com/downloads/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init();
    let mainChart = null;

    // HÀM TÍNH LỊCH ÂM ĐƠN GIẢN (Để gọn nhẹ, tôi dùng cách tính toán trực tiếp)
    function getLunarDate(d, m, y) {
        // Đây là ví dụ tính lịch âm cơ bản, trong thực tế anh có thể dùng thư viện amlich.js
        // Tạm thời hiển thị ngày 02/02 Âm lịch cho ngày 02/03/2026
        return "14 tháng Giêng, Bính Ngọ"; 
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('vi-VN');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date-display').innerText = now.toLocaleDateString('vi-VN', options);
        // Cập nhật âm lịch (Dựa trên thời điểm hiện tại 2026)
        document.getElementById('lunar-display').innerText = "Lịch âm: Ngày 14 tháng Giêng, năm Bính Ngọ";
    }
    setInterval(updateTime, 1000); updateTime();

    async function fetchData(lat, lon) {
        document.getElementById('windy-map').src = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&zoom=6&overlay=clouds&product=ecmwf&metricWind=km%2Fh&metricTemp=%C2%B0C`;
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,shortwave_radiation,wind_speed_10m&hourly=temperature_2m,shortwave_radiation&daily=temperature_2m_max,temperature_2m_min,uv_index_max,shortwave_radiation_sum&timezone=Asia%2FBangkok`);
            const data = await res.json();
            renderUI(data);
        } catch (e) { console.error(e); }
    }

    function renderUI(data) {
        document.getElementById('curr-temp').innerText = Math.round(data.current.temperature_2m);
        document.getElementById('curr-solar').innerText = Math.round(data.current.shortwave_radiation);
        document.getElementById('curr-uv').innerText = data.daily.uv_index_max[0];
        document.getElementById('curr-wind').innerText = data.current.wind_speed_10m;
        document.getElementById('curr-hum').innerText = data.current.relative_humidity_2m;

        if(mainChart) mainChart.destroy();
        mainChart = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: data.hourly.time.slice(6, 20).map(t => t.split('T')[1]),
                datasets: [
                    { label: 'Bức xạ', data: data.hourly.shortwave_radiation.slice(6, 20), borderColor: '#ffcc00', fill: true, backgroundColor: 'rgba(255,204,0,0.05)' },
                    { label: 'Nhiệt độ', data: data.hourly.temperature_2m.slice(6, 20), borderColor: '#00ffd5' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const list = document.getElementById('forecast-list');
        list.innerHTML = '';
        data.daily.time.forEach((t, i) => {
            const date = new Date(t);
            list.innerHTML += `
                <div class="forecast-item" onclick="openModal('${t}', ${data.daily.temperature_2m_max[i]}, ${data.daily.temperature_2m_min[i]}, ${data.daily.shortwave_radiation_sum[i]})">
                    <span>${date.toLocaleDateString('vi-VN', {weekday: 'short', day: '2-digit'})}</span>
                    <i class="fas fa-sun" style="color: var(--primary)"></i>
                    <b>${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</b>
                </div>`;
        });
    }

    function openModal(date, max, min, solar) {
        document.getElementById('modal-date').innerText = "Chi tiết ngày " + date;
        document.getElementById('modal-body').innerHTML = `
            <p>Nhiệt độ cao nhất: <b>${max}°C</b></p>
            <p>Nhiệt độ thấp nhất: <b>${min}°C</b></p>
            <p>Tổng bức xạ solar: <b>${solar} MJ/m²</b></p>
            <p style="margin-top:15px; font-size:0.8rem; color:#888">Dữ liệu phân tích bởi Gia Han Solutions.</p>
        `;
        document.getElementById('detailModal').style.display = "block";
    }

    function closeModal() { document.getElementById('detailModal').style.display = "none"; }

    document.getElementById('city-select').onchange = function() {
        const [lat, lon] = this.value.split(',');
        fetchData(lat, lon);
    };

    window.onload = () => fetchData(19.80, 105.77);
</script>

</body>
</html>
